<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TSLA Trade Decision Engine</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f3f4f6; font-family: system-ui, -apple-system, sans-serif; }
    input:focus { border-color: #6b7280 !important; }
    button:active { opacity: 0.85; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const OPEN_PRICE_DEFAULT = 396.73;
    const SHARES_HELD = 425;

    function ScoreBar({ score }) {
      const pct = Math.min(score, 100);
      const color = pct >= 75 ? "#16a34a" : pct >= 50 ? "#d97706" : pct >= 25 ? "#ea580c" : "#dc2626";
      return (
        <div style={{ background: "#e5e7eb", borderRadius: 4, height: 8, width: "100%", overflow: "hidden" }}>
          <div style={{
            width: `${pct}%`, height: "100%", background: color,
            borderRadius: 4, transition: "width 0.6s cubic-bezier(0.34,1.56,0.64,1)"
          }} />
        </div>
      );
    }

    function ConditionRow({ label, value, met, detail }) {
      return (
        <div style={{
          display: "flex", alignItems: "center", gap: 12,
          padding: "10px 0", borderBottom: "1px solid #f3f4f6"
        }}>
          <div style={{
            width: 24, height: 24, borderRadius: "50%", flexShrink: 0,
            background: met ? "#dcfce7" : "#fee2e2",
            border: `2px solid ${met ? "#16a34a" : "#dc2626"}`,
            display: "flex", alignItems: "center", justifyContent: "center",
            fontSize: 12, color: met ? "#16a34a" : "#dc2626", fontWeight: 800
          }}>
            {met ? "✓" : "✗"}
          </div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: "#111" }}>{label}</div>
            <div style={{ fontSize: 12, color: "#6b7280", marginTop: 1 }}>{detail}</div>
          </div>
          <div style={{
            fontSize: 14, fontWeight: 700, fontFamily: "monospace",
            color: met ? "#16a34a" : "#dc2626", minWidth: 60, textAlign: "right"
          }}>
            {value}
          </div>
        </div>
      );
    }

    function App() {
      const [mode, setMode] = useState("sell");
      const [openPrice, setOpenPrice] = useState(OPEN_PRICE_DEFAULT);
      const [currentPrice, setCurrentPrice] = useState("");
      const [vwap, setVwap] = useState("");
      const [rsi, setRsi] = useState("");
      const [volume, setVolume] = useState("normal");
      const [hasEarnings, setHasEarnings] = useState(false);
      const [result, setResult] = useState(null);

      const pctFromOpen = currentPrice && openPrice
        ? ((parseFloat(currentPrice) - parseFloat(openPrice)) / parseFloat(openPrice)) * 100 : null;
      const pctAboveVwap = currentPrice && vwap
        ? ((parseFloat(currentPrice) - parseFloat(vwap)) / parseFloat(vwap)) * 100 : null;

      const analyze = () => {
        if (!currentPrice || !vwap || !rsi) return;
        const price = parseFloat(currentPrice);
        const rsiVal = parseFloat(rsi);
        const pctOpen = pctFromOpen;
        const pctVwap = pctAboveVwap;

        if (mode === "sell") {
          const c1 = pctOpen >= 3;
          const c2 = rsiVal >= 65;
          const c3 = pctVwap >= 2;
          const c4 = volume !== "low";
          const c5 = !hasEarnings;
          const metCount = [c1, c2, c3, c4, c5].filter(Boolean).length;
          const score = Math.round((metCount / 5) * 100);

          let action, actionColor, actionBg, subtitle;
          if (!c5) {
            action = "⚠️ שבוע דוחות — הימנע";
            actionColor = "#92400e"; actionBg = "#fef3c7";
            subtitle = "מסוכן למכור לפני דוחות — מומנטום עלול להמשיך ימים";
          } else if (score >= 80) {
            action = "🔴 מכור עכשיו";
            actionColor = "#991b1b"; actionBg = "#fee2e2";
            subtitle = "כל התנאים מתקיימים. פעל מיד";
          } else if (score >= 60) {
            action = "🟡 מכירה חלקית מומלצת";
            actionColor = "#92400e"; actionBg = "#fef3c7";
            subtitle = "רוב התנאים מתקיימים. שקול מכירת 25–33% בלבד";
          } else if (score >= 40) {
            action = "🟠 המתן — עוד קצת";
            actionColor = "#9a3412"; actionBg = "#ffedd5";
            subtitle = "חלק מהתנאים חסרים. עקוב אחרי RSI וה-VWAP";
          } else {
            action = "⚪ אל תמכור";
            actionColor = "#374151"; actionBg = "#f9fafb";
            subtitle = "התנאים לא בשלים. סבלנות";
          }

          const op = parseFloat(openPrice);
          const target4 = (op * 1.04).toFixed(2);
          const target6 = (op * 1.06).toFixed(2);

          setResult({
            mode: "sell", action, actionColor, actionBg, subtitle, score,
            conditions: [
              { label: "עלייה מהפתיחה", value: `${pctOpen?.toFixed(2)}%`, met: c1, detail: `נדרש ≥3% | פתיחה $${openPrice}` },
              { label: "RSI (גרף 5 דקות)", value: rsiVal, met: c2, detail: `נדרש ≥65 | כרגע ${rsiVal >= 70 ? "גבוה מאוד 🔥" : rsiVal >= 65 ? "גבוה" : "לא מספיק"}` },
              { label: "מחיר מעל VWAP", value: `${pctVwap?.toFixed(2)}%`, met: c3, detail: `נדרש ≥2% | VWAP $${vwap}` },
              { label: "נפח מסחר", value: volume === "high" ? "גבוה" : volume === "normal" ? "רגיל" : "נמוך", met: c4, detail: volume === "low" ? "נפח נמוך = חולשה" : "נפח תומך בתנועה" },
              { label: "ללא דוחות", value: hasEarnings ? "⚠️ יש דוחות" : "✓ בטוח", met: c5, detail: hasEarnings ? "שבוע דוחות — מסוכן" : "אין אירוע קרוב" },
            ],
            orders: [
              { label: "Limit Sell — 212 מניות (50%)", price: target4, note: `+4% מהפתיחה | רווח משוער: $${((parseFloat(target4) - op) * 212).toFixed(0)}` },
              { label: "Limit Sell — 106 מניות (25%)", price: target6, note: `+6% מהפתיחה | רווח משוער: $${((parseFloat(target6) - op) * 106).toFixed(0)}` },
            ],
          });
        } else {
          const c1 = rsiVal <= 55;
          const c2 = pctVwap <= 0.5;
          const c3 = volume !== "high";
          const c4 = pctOpen >= 0;
          const metCount = [c1, c2, c3, c4].filter(Boolean).length;
          const score = Math.round((metCount / 4) * 100);

          let action, actionColor, actionBg, subtitle;
          if (score >= 75) {
            action = "🟢 קנה חזרה עכשיו";
            actionColor = "#14532d"; actionBg = "#dcfce7";
            subtitle = "תנאים אופטימליים לכניסה";
          } else if (score >= 50) {
            action = "🔵 קנה חזרה — סביר";
            actionColor = "#1e3a8a"; actionBg = "#dbeafe";
            subtitle = "רוב האותות תומכים. כניסה הגיונית";
          } else {
            action = "⏳ המתן — עדיין גבוה";
            actionColor = "#9a3412"; actionBg = "#ffedd5";
            subtitle = "המניה עדיין גבוהה. המתן לצהריים האמריקאיים (18:30–21:00 שעון ישראל)";
          }

          const rb1 = (price * 0.98).toFixed(2);
          const rb2 = (price * 0.97).toFixed(2);
          const extra = Math.max(0, Math.floor((212 * price) / parseFloat(rb1)) - 212);

          setResult({
            mode: "rebuy", action, actionColor, actionBg, subtitle, score,
            conditions: [
              { label: "RSI ירד מתחת ל-55", value: rsiVal, met: c1, detail: `כרגע ${rsiVal} — ${rsiVal <= 55 ? "התקרר ✓" : "עדיין חם"}` },
              { label: "מחיר קרוב ל-VWAP", value: `${pctVwap?.toFixed(2)}%`, met: c2, detail: "נדרש ≤0.5% מעל VWAP" },
              { label: "נפח לא מואץ", value: volume === "high" ? "גבוה ⚠️" : "✓", met: c3, detail: "נפח גבוה = מומנטום ממשיך, לא מתאים לכניסה" },
              { label: "יום עדיין חיובי", value: `${pctOpen?.toFixed(2)}%`, met: c4, detail: "מחיר מעל פתיחה" },
            ],
            orders: [
              { label: "Limit Buy אגרסיבי (תוך-יומי)", price: rb1, note: `2% מתחת למחיר הנוכחי | +${extra} מניות בונוס` },
              { label: "Limit Buy מאוזן (תוך-יומי)", price: rb2, note: "3% מתחת | סיכוי מילוי נמוך יותר אך מחיר טוב יותר" },
            ],
          });
        }
      };

      const inputStyle = {
        border: "1.5px solid #d1d5db", borderRadius: 8, color: "#111",
        fontSize: 15, padding: "10px 14px", width: "100%", background: "#fff",
        outline: "none", boxSizing: "border-box", fontFamily: "monospace"
      };
      const labelStyle = {
        fontSize: 12, color: "#374151", fontWeight: 600,
        marginBottom: 5, display: "block"
      };

      return (
        <div style={{ minHeight: "100vh", background: "#f3f4f6", fontFamily: "system-ui, -apple-system, sans-serif", color: "#111", padding: "0 0 60px", direction: "rtl" }}>
          <div style={{ background: "#111827", padding: "20px 24px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div>
              <div style={{ fontSize: 11, color: "#9ca3af", letterSpacing: "0.12em", fontFamily: "monospace", marginBottom: 4 }}>TSLA · NASDAQ</div>
              <div style={{ fontSize: 20, fontWeight: 700, color: "#fff" }}>Trade Decision Engine</div>
            </div>
            <div style={{ background: "#1f2937", border: "1px solid #374151", borderRadius: 10, padding: "10px 16px", textAlign: "center" }}>
              <div style={{ fontSize: 10, color: "#6ee7b7", fontFamily: "monospace", letterSpacing: "0.1em" }}>HOLDING</div>
              <div style={{ fontSize: 22, fontWeight: 800, color: "#34d399", fontFamily: "monospace" }}>{SHARES_HELD}</div>
              <div style={{ fontSize: 10, color: "#6ee7b7" }}>מניות</div>
            </div>
          </div>

          <div style={{ padding: "16px" }}>
            <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
              {[["sell", "🔴 מכירה"], ["rebuy", "🟢 קנייה חוזרת"]].map(([m, label]) => (
                <button key={m} onClick={() => { setMode(m); setResult(null); }} style={{
                  flex: 1, padding: "13px", borderRadius: 10, cursor: "pointer",
                  border: `2px solid ${mode === m ? (m === "sell" ? "#dc2626" : "#16a34a") : "#e5e7eb"}`,
                  background: mode === m ? (m === "sell" ? "#fee2e2" : "#dcfce7") : "#fff",
                  color: mode === m ? (m === "sell" ? "#991b1b" : "#14532d") : "#9ca3af",
                  fontSize: 15, fontWeight: 700
                }}>
                  {label}
                </button>
              ))}
            </div>

            <div style={{ background: "#fff", borderRadius: 12, border: "1px solid #e5e7eb", padding: "16px", marginBottom: 12 }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: "#374151", marginBottom: 14 }}>נתוני שוק נוכחיים</div>

              <div style={{ display: "flex", gap: 10, marginBottom: 12 }}>
                <div style={{ flex: 1 }}>
                  <label style={labelStyle}>מחיר פתיחה ($)</label>
                  <input style={inputStyle} type="number" value={openPrice} onChange={(e) => setOpenPrice(e.target.value)} placeholder="396.73" />
                </div>
                <div style={{ flex: 1 }}>
                  <label style={labelStyle}>מחיר נוכחי ($)</label>
                  <input style={inputStyle} type="number" value={currentPrice} onChange={(e) => setCurrentPrice(e.target.value)} placeholder="410.00" />
                </div>
              </div>

              <div style={{ display: "flex", gap: 10, marginBottom: 12 }}>
                <div style={{ flex: 1 }}>
                  <label style={labelStyle}>VWAP ($)</label>
                  <input style={inputStyle} type="number" value={vwap} onChange={(e) => setVwap(e.target.value)} placeholder="402.50" />
                </div>
                <div style={{ flex: 1 }}>
                  <label style={labelStyle}>RSI (גרף 5 דקות)</label>
                  <input style={inputStyle} type="number" value={rsi} onChange={(e) => setRsi(e.target.value)} placeholder="72" />
                </div>
              </div>

              {pctFromOpen !== null && (
                <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
                  {[
                    { label: "מהפתיחה", val: `${pctFromOpen >= 0 ? "+" : ""}${pctFromOpen.toFixed(2)}%`, good: pctFromOpen >= 3 },
                    ...(pctAboveVwap !== null ? [{ label: "מעל VWAP", val: `${pctAboveVwap >= 0 ? "+" : ""}${pctAboveVwap.toFixed(2)}%`, good: pctAboveVwap >= 2 }] : []),
                    ...(rsi ? [{ label: "RSI", val: rsi, good: parseFloat(rsi) >= 65 }] : []),
                  ].map((s, i) => (
                    <div key={i} style={{
                      flex: 1, background: s.good ? "#f0fdf4" : "#f9fafb",
                      border: `1px solid ${s.good ? "#bbf7d0" : "#e5e7eb"}`,
                      borderRadius: 8, padding: "8px", textAlign: "center"
                    }}>
                      <div style={{ fontSize: 10, color: "#6b7280", marginBottom: 3 }}>{s.label}</div>
                      <div style={{ fontSize: 16, fontWeight: 800, fontFamily: "monospace", color: s.good ? "#16a34a" : "#374151" }}>{s.val}</div>
                    </div>
                  ))}
                </div>
              )}

              <div style={{ marginBottom: 12 }}>
                <label style={labelStyle}>נפח מסחר</label>
                <div style={{ display: "flex", gap: 6 }}>
                  {[["low", "נמוך"], ["normal", "רגיל"], ["high", "גבוה"]].map(([v, l]) => (
                    <button key={v} onClick={() => setVolume(v)} style={{
                      flex: 1, padding: "9px 4px", borderRadius: 7, cursor: "pointer",
                      border: `1.5px solid ${volume === v ? "#6b7280" : "#e5e7eb"}`,
                      background: volume === v ? "#f3f4f6" : "#fff",
                      color: volume === v ? "#111" : "#9ca3af",
                      fontSize: 13, fontWeight: volume === v ? 700 : 400
                    }}>
                      {l}
                    </button>
                  ))}
                </div>
              </div>

              <div style={{
                display: "flex", alignItems: "center", justifyContent: "space-between",
                padding: "10px 12px", background: hasEarnings ? "#fef3c7" : "#f9fafb",
                borderRadius: 8, border: `1px solid ${hasEarnings ? "#fcd34d" : "#e5e7eb"}`
              }}>
                <span style={{ fontSize: 13, fontWeight: 600, color: hasEarnings ? "#92400e" : "#374151" }}>
                  {hasEarnings ? "⚠️ שבוע דוחות — מסוכן!" : "שבוע דוחות?"}
                </span>
                <button onClick={() => setHasEarnings(!hasEarnings)} style={{
                  padding: "6px 14px", borderRadius: 6, cursor: "pointer",
                  border: `1.5px solid ${hasEarnings ? "#f59e0b" : "#d1d5db"}`,
                  background: hasEarnings ? "#f59e0b" : "#fff",
                  color: hasEarnings ? "#fff" : "#374151",
                  fontSize: 12, fontWeight: 700
                }}>
                  {hasEarnings ? "כן" : "לא"}
                </button>
              </div>
            </div>

            <button onClick={analyze} disabled={!currentPrice || !vwap || !rsi} style={{
              width: "100%", padding: "16px", borderRadius: 12, border: "none",
              cursor: !currentPrice || !vwap || !rsi ? "not-allowed" : "pointer",
              background: !currentPrice || !vwap || !rsi ? "#e5e7eb" : mode === "sell" ? "#dc2626" : "#16a34a",
              color: !currentPrice || !vwap || !rsi ? "#9ca3af" : "#fff",
              fontSize: 16, fontWeight: 700, marginBottom: 20
            }}>
              {mode === "sell" ? "🔍 נתח — האם למכור?" : "🔍 נתח — האם לקנות חזרה?"}
            </button>

            {result && (
              <div style={{ background: "#fff", borderRadius: 12, border: `2px solid ${result.actionColor}`, overflow: "hidden" }}>
                <div style={{ background: result.actionBg, padding: "18px 20px", borderBottom: `1px solid ${result.actionColor}44` }}>
                  <div style={{ fontSize: 22, fontWeight: 800, color: result.actionColor, marginBottom: 4 }}>{result.action}</div>
                  <div style={{ fontSize: 14, color: "#374151", marginBottom: 12 }}>{result.subtitle}</div>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                    <span style={{ fontSize: 12, fontWeight: 600, color: "#6b7280" }}>ציון ביטחון</span>
                    <span style={{ fontSize: 12, fontWeight: 800, fontFamily: "monospace", color: result.actionColor }}>{result.score}/100</span>
                  </div>
                  <ScoreBar score={result.score} />
                </div>

                <div style={{ padding: "4px 20px 0" }}>
                  {result.conditions.map((c, i) => <ConditionRow key={i} {...c} />)}
                </div>

                <div style={{ padding: "16px 20px", background: "#f9fafb", borderTop: "1px solid #e5e7eb" }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: "#374151", marginBottom: 10 }}>📋 פקודות Limit מומלצות</div>
                  {result.orders.map((o, i) => (
                    <div key={i} style={{
                      background: "#fff", border: "1px solid #e5e7eb", borderRadius: 10,
                      padding: "12px 14px", marginBottom: 8,
                      display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12
                    }}>
                      <div>
                        <div style={{ fontSize: 13, fontWeight: 600, color: "#111", marginBottom: 3 }}>{o.label}</div>
                        <div style={{ fontSize: 11, color: "#6b7280" }}>{o.note}</div>
                      </div>
                      <div style={{
                        fontSize: 18, fontWeight: 800, fontFamily: "monospace",
                        color: result.mode === "sell" ? "#dc2626" : "#16a34a", whiteSpace: "nowrap"
                      }}>
                        ${o.price}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
